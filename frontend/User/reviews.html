<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reviews</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root{--fh-bg:#f7f4ee;--fh-soft:#efe5d7;--fh-line:#d8ccb9;--fh-line-2:#e6dac8;--fh-brown:#6d2f1d;--fh-brown-2:#3d241a;--fh-orange:#ea580c;--fh-orange-2:#c2410c}
    body{background:var(--fh-bg);color:var(--fh-brown-2)}
    .fh-top{background:#efe5d7f2;border-bottom:1px solid var(--fh-line);backdrop-filter:blur(10px)}
    .fh-card{background:#fff;border:1px solid var(--fh-line-2);border-radius:1.75rem;box-shadow:0 10px 24px rgba(61,36,26,.06)}
    .fh-btn{background:var(--fh-orange)!important;border:none!important;color:#fff!important;border-radius:9999px}
    .fh-btn:hover{background:var(--fh-orange-2)!important}
    .fh-outline{background:#fff!important;border:1px solid #c8b39b!important;color:var(--fh-brown)!important;border-radius:9999px}
  </style>
</head>
<body class="min-h-screen">
  <div class="navbar sticky top-0 z-50 px-4 lg:px-8 min-h-16 fh-top">
    <div class="flex-1 items-center gap-2">
      <a href="customer-dashboard.html" class="btn btn-ghost btn-circle text-xl text-[#6d2f1d]">&lt;</a>
      <div class="text-2xl font-extrabold text-orange-600">My Reviews</div>
    </div>
    <div class="flex-none gap-2">
      <a href="my-orders.html" class="btn fh-outline">My Orders</a>
      <a href="cart.html" class="btn btn-ghost btn-circle hover:bg-orange-100">
        <div class="indicator">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#6d2f1d]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4m1.6 8L5.4 5M7 13l-1.3 1.3A1 1 0 006.4 16H19m-12 0a2 2 0 104 0m6 0a2 2 0 104 0"/></svg>
          <span class="badge badge-sm indicator-item bg-orange-600 text-white border-0 js-cart-count">0</span>
        </div>
      </a>
    </div>
  </div>

  <main class="max-w-6xl mx-auto p-4 lg:p-8 space-y-4">
    <div class="fh-card">
      <div class="p-5 grid grid-cols-1 md:grid-cols-3 gap-3">
        <div class="rounded-2xl border border-[#efe5d7] p-4">
          <div class="text-sm text-[#8b6b5c]">Reviewed Items</div>
          <div id="sum-reviewed" class="text-2xl font-extrabold text-[#3d241a]">0</div>
        </div>
        <div class="rounded-2xl border border-[#efe5d7] p-4">
          <div class="text-sm text-[#8b6b5c]">Pending Reviews</div>
          <div id="sum-pending" class="text-2xl font-extrabold text-[#3d241a]">0</div>
        </div>
        <div class="rounded-2xl border border-[#efe5d7] p-4">
          <div class="text-sm text-[#8b6b5c]">Average Rating</div>
          <div id="sum-avg" class="text-2xl font-extrabold text-orange-600">0.0</div>
        </div>
      </div>
    </div>

    <div id="empty" class="fh-card hidden">
      <div class="p-8 text-center">
        <h2 class="text-2xl font-bold text-[#3d241a]">No completed orders yet</h2>
        <p class="text-[#8b6b5c] mt-2">After your order is done, you can leave reviews here.</p>
        <a href="customer-dashboard.html" class="btn fh-btn mt-4">Back to Menu</a>
      </div>
    </div>
    <div id="list" class="space-y-4"></div>
  </main>

  <dialog id="reviewModal" class="modal">
    <div class="modal-box max-w-lg fh-card">
      <h3 class="text-2xl font-extrabold text-[#3d241a]">Write Review</h3>
      <p id="reviewItem" class="text-[#8b6b5c] mt-1"></p>
      <div class="mt-4">
        <div class="text-sm font-semibold text-[#6d2f1d] mb-2">Rating</div>
        <div class="rating rating-lg">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="1">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="2">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="3">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="4">
          <input type="radio" name="reviewStars" class="mask mask-star-2 bg-orange-400" value="5">
        </div>
      </div>
      <div class="mt-4">
        <div class="text-sm font-semibold text-[#6d2f1d] mb-2">Review</div>
        <textarea id="reviewText" class="textarea textarea-bordered w-full rounded-2xl border-[#d8ccb9] h-28" placeholder="Write your review..."></textarea>
      </div>
      <div class="modal-action">
        <form method="dialog"><button class="btn fh-outline">Cancel</button></form>
        <button id="saveReview" class="btn fh-btn">Save Review</button>
      </div>
    </div>
  </dialog>

  <script src="../app.js"></script>
  <script>
    requireCustomerSession();
    const empty=document.getElementById("empty"),list=document.getElementById("list"),reviewModal=document.getElementById("reviewModal"),reviewItem=document.getElementById("reviewItem"),reviewText=document.getElementById("reviewText"),saveReview=document.getElementById("saveReview");
    let currentReviewKey="",currentOrderId="",currentItemName="",currentItemLabel="",currentMenuId=0;

    async function hydrateReviewMapFromDB(orders){
      const map=JSON.parse(localStorage.getItem("review_map")||"{}");
      const session=getCustomerSession()||{};
      const tableId=Number(session.table_id||0);
      const customerName=encodeURIComponent(String(session.name||"").trim());
      const menuIds=[...new Set((orders||[]).flatMap(o=>(o.items||[]).map(i=>Number(i.menu_id||0)).filter(Boolean)))];
      await Promise.all(menuIds.map(async(menuId)=>{
        try{
          const rows=await apiGet(`/api/customer/reviews?menu_id=${menuId}&table_id=${tableId}&customer_name=${customerName}`);
          (rows||[]).forEach((r)=>{
            const key=`${r.order_id}-${r.menu_id}`;
            map[key]={stars:Number(r.stars||0),text:r.text||"",time:r.time?new Date(r.time).toLocaleString():"-"};
          });
        }catch(_){}
      }));
      localStorage.setItem("review_map",JSON.stringify(map));
      return map;
    }

    function setStars(n){
      document.querySelectorAll('[name="reviewStars"]').forEach(x=>x.checked=+x.value===+n);
    }
    function rowView(o,x,rowIndex){
      const reviewKey=`${o.dbId}-${x.menu_id||rowIndex}`,r=getReview(reviewKey);
      const noteLines=itemNotes(x);
      return `<div class="fh-card">
        <div class="p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div class="flex-1">
            <div class="text-sm text-[#8b6b5c]">Order ${o.id}</div>
            <h3 class="text-xl font-bold text-[#3d241a]">${itemLabel(x)}</h3>
            <div class="text-sm text-[#8b6b5c] mt-1">Qty ${x.qty} • ${money(x.totalPrice)}</div>
            ${noteLines.length?`<div class="text-sm text-[#8b6b5c] mt-2">${noteLines.join(" • ")}</div>`:""}
            ${r?`<div class="mt-3 rounded-2xl border border-[#e6dac8] bg-[#faf6ef] p-3"><div class="text-orange-600 font-bold">${starText(+r.stars||0)}</div><div class="text-sm text-[#3d241a] mt-1">${r.text||"-"}</div><div class="text-xs text-[#8b6b5c] mt-1">${r.time||"-"}</div></div>`:"<div class='text-sm text-[#8b6b5c] mt-3'>No review yet</div>"}
          </div>
          <div>
            <button onclick='openReview(${JSON.stringify(reviewKey)},${JSON.stringify(o.dbId)},${JSON.stringify(x.menu_id||0)},${JSON.stringify(x.name)},${JSON.stringify(itemLabel(x))})' class="btn ${r?"fh-outline":"fh-btn"}">${r?"Edit Review":"Write Review"}</button>
          </div>
        </div>
      </div>`;
    }

    function render(){
      const doneOrders=getMyCustomerOrders()
        .filter((o)=>String(o.status||"").toUpperCase()==="DONE")
        .sort((a,b)=>new Date(b.time)-new Date(a.time));
      const rows=[];
      doneOrders.forEach((o)=>{(o.items||[]).forEach((x,i)=>rows.push({order:o,item:x,rowIndex:i}))});
      empty.classList.toggle("hidden",rows.length>0);
      list.innerHTML=rows.map((r)=>rowView(r.order,r.item,r.rowIndex)).join("");

      const reviewRows=rows.map((r)=>getReview(`${r.order.dbId}-${r.item.menu_id||r.rowIndex}`)).filter(Boolean);
      const reviewed=reviewRows.length;
      const pending=Math.max(0,rows.length-reviewed);
      const avg=reviewed?(reviewRows.reduce((sum,r)=>sum+Number(r.stars||0),0)/reviewed).toFixed(1):"0.0";
      document.getElementById("sum-reviewed").textContent=String(reviewed);
      document.getElementById("sum-pending").textContent=String(pending);
      document.getElementById("sum-avg").textContent=avg;
      updateBadges();
    }

    function openReview(reviewKey,orderId,menuId,itemName,itemLabelText){
      currentReviewKey=reviewKey;currentOrderId=orderId;currentMenuId=menuId;currentItemName=itemName;currentItemLabel=itemLabelText;
      const r=getReview(reviewKey);
      reviewItem.textContent=itemLabelText;
      reviewText.value=r?.text||"";
      setStars(r?.stars||5);
      reviewModal.showModal();
    }

    saveReview.onclick=async ()=>{
      const stars=document.querySelector('[name="reviewStars"]:checked')?.value;
      const text=reviewText.value.trim();
      if(!stars)return alert("Please choose a star rating.");
      if(!text)return alert("Please write your review.");
      try{
        await addReview({reviewKey:currentReviewKey,orderId:currentOrderId,menuId:currentMenuId,itemName:currentItemName,itemLabel:currentItemLabel,stars,text});
      }catch(err){
        return alert(err.message||"Review save failed");
      }
      reviewModal.close();
      render();
    };

    (async()=>{
      try{await syncCustomerOrdersFromDB();}catch(_){}
      await hydrateReviewMapFromDB(getMyCustomerOrders());
      render();
    })();
    setInterval(render,3000);
    window.openReview=openReview;
  </script>
</body>
</html>
